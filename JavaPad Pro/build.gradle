plugins {
    id 'java'
    id 'application'
}

group = 'com.javapad'
version = '0.1.0'

sourceCompatibility = '11'
targetCompatibility = '11'

repositories {
    mavenCentral()
}

dependencies {
    // RSyntaxTextArea: advanced, fast editor component with syntax highlighting
    implementation 'com.fifesoft:rsyntaxtextarea:3.1.3'
}

application {
    // For Gradle 6.7+ use mainClassName, for newer use mainClass
    mainClass = 'com.javapad.Main'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.javapad.Main'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}
